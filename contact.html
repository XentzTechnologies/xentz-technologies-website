<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact | Xentz Technologies</title>
    <link rel="stylesheet" href="assets/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CBYN44WXGQ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-CBYN44WXGQ');
    </script>
</head>


<body>
<header>
    <div class="logo">Xentz<span>Technologies</span></div>
    <nav>
        <a href="index.html">Home</a>
        <a href="services.html">Services</a>
        <a href="portfolio.html">Portfolio</a>
        <a href="about.html">About</a>
        <a href="contact.html" class="btn-glow">Contact</a>
    </nav>
</header>

<form id="contactForm" class="contact-form" action="https://formspree.io/f/meoyrvej" method="POST">


  <label>Your Name</label>
  <input type="text" name="name" required>

  <label>Your Email</label>
  <input type="email" name="email" required>

  <label>Your Website (optional)</label>
  <input type="text" name="website">

  <label>Your Message</label>
  <textarea name="message" required></textarea>

  <!-- ✅ Anti-bot honeypot (SAFE) -->
  <input type="text" name="_gotcha" style="display:none">

  <button class="btn-primary" type="submit">Send Message</button>

</form>
<footer>
  <p>© 2025 Xentz Technologies • Cybersecurity Consulting</p>
</footer>

<script>
const form = document.getElementById("contactForm");

form.addEventListener("submit", async function(e) {
  e.preventDefault();

  const formData = new FormData(form);

  const response = await fetch("https://formspree.io/f/meoyrvej", {
    method: "POST",
    body: formData,
    headers: {
      "Accept": "application/json"
    }
  });

  if (response.ok) {
    window.location.href = "https://xentztechnologies.com/thank-you.html";
  } else {
    alert("Something went wrong. Please try again.");
  }
});
</script>

</body>
</html>
